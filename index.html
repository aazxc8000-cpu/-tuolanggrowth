<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>鑫富翁 官方入口</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

.main{
    position:relative;
    width:100%;
    height:100vh;
}

.bg{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.1)
    );
}

.button-wrap{
    position:absolute;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);
    width:82%;
    max-width:420px;
}

.open-btn{
    display:block;
    width:100%;
    transition:0.25s;
}

.open-btn img{
    width:100%;
    display:block;
}

.open-btn:hover{
    transform:scale(1.03);
}

</style>
</head>

<body>

<div class="main">

<!-- 主背景圖 -->
<img class="bg" src="main.jpg">

<div class="overlay"></div>

<!-- 開版按鈕 -->
<div class="button-wrap">

<a class="open-btn"
href="https://line.me/R/ti/p/@YOUR_LINE_ID">

<img src="button.png">

</a>

</div>

</div>

</body>
</html>
